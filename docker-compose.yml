version: "3.9"

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  backend:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/marketplace
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/marketplace
      REDIS_URL: redis://redis:6379/0
    command: >
      sh -c "uv run alembic upgrade head &&
             uv run granian --interface asgi app.main:app
             --host 0.0.0.0 --port 8000 --workers 4"

  worker:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/marketplace
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db:5432/marketplace
      REDIS_URL: redis://redis:6379/0
    command: uv run arq app.workers.tasks.WorkerSettings

volumes:
  postgres_data:
