name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: marketplace_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/marketplace_test
      DATABASE_URL_SYNC: postgresql://postgres:postgres@localhost:5432/marketplace_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: test-secret-key-32-chars-long-ok
      GOOGLE_CLIENT_ID: test.apps.googleusercontent.com
      MOYASAR_SECRET_KEY: sk_test_fake
      MOYASAR_WEBHOOK_SECRET: test-webhook-secret

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        continue-on-error: true

  docker-build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t marketplace-backend .

      - name: Verify image starts
        run: |
          docker run --rm --entrypoint uv marketplace-backend \
            run python -c "from app.main import app; print('app OK, routes:', len(app.routes))"
